name: Rebuild Pages data

on:
  push:
    branches: [main]
    paths:
      - "src/data/daily/**"
      - "src/data/stories/**"
      - "src/pages/**"
      - "public/**"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rebuild-pages-data
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Pages files
        run: npm run build
        env:
          ASTRO_TELEMETRY_DISABLED: "1"
          PUBLIC_BASE_PATH: /hakoniwa-site/
          PUBLIC_OUT_DIR: docs

      - name: Commit generated Pages files
        run: |
          git config user.name "three-notes"
          git config user.email "three-notes@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git commit -m "Rebuild Pages data"
          git push
